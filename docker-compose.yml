  services:
    db:
      image: mysql:latest
      env_file:
        - ./.env
      networks:
        - app-network
      volumes:
        - "./sql:/docker-entrypoint-initdb.d"
        - db-data:/var/lib/mysql
      restart: unless-stopped
      
    phpmyadmin:
      image: phpmyadmin:latest
      env_file:
        - ./.env
      networks:
        - app-network
      environment:
        PMA_HOST: ${DB_HOST}
        PMA_PORT: 3306
        PMA_USER: ${DB_USER}
        PMA_PASSWORD: ${DB_PASSWORD}
      restart: unless-stopped

    app:
      build: ./
      networks:
        - app-network
      env_file:
        - ./.env
      volumes:
        - ./:/var/www/html
      command: bash -c "composer install && php -S 0.0.0.0:80 -t public"
      depends_on:
        - db
      restart: unless-stopped

    nginx:
      image: nginx:latest
      networks:
        - app-network
      ports:
        - "80:80"
      volumes:
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:
        - app
      restart: unless-stopped

  networks:
    app-network:
      driver: bridge

  volumes:
    db-data:
      driver: local